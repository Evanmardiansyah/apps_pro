<!DOCTYPE html>
<html lang="id" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>FinanSmart JagoNgulik - Edisi Bersih Pro</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script> 
    tailwind.config = { 
      darkMode: 'class', 
      theme: { 
        extend: {
          boxShadow: {
            'zenith-soft': '0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03)',
            'zenith-medium': '0 8px 12px -2px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05)',
          }
        } 
      } 
    } 
  </script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  
  <style>
    html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
    html { background-color: #f1f5f9; } html.dark { background-color: #0f172a; }
    .hide-scroll::-webkit-scrollbar { display: none; } .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
    .btn-ai { background: linear-gradient(135deg, #3b82f6 0%, #4f46e5 100%); transition: all 0.2s ease-in-out; }
    .progress-bar-fill { transition: width 1s ease-in-out, background-color 0.3s ease; }
    input:focus, select:focus, textarea:focus { outline: none; }
    html.dark .swal2-popup { background-color: #1e293b !important; color: #f1f5f9 !important; border: 1px solid #334155; }
    html.dark .swal2-title, html.dark .swal2-html-container { color: #f8fafc !important; }
    html.dark .swal2-input, html.dark .swal2-select { background-color: #334155 !important; color: #f8fafc !important; border-color: #475569 !important; }

    /* Zenith Sidebar Styles */
    .nav-admin-btn { position: relative; }
    .nav-admin-btn.desktop-admin-btn::before { content: ''; position: absolute; left: 0; top: 0; height: 100%; width: 4px; background-color: transparent; transition: background-color 0.2s; border-radius: 0 4px 4px 0; }
    .nav-admin-btn.active.desktop-admin-btn::before { background-color: #4f46e5; }
    .nav-admin-btn.desktop-admin-btn:not(.active):hover::before { background-color: #a5b4fc; }

    /* Table styling enterprise */
    table.enterprise-table { border-collapse: separate; border-spacing: 0; width: 100%; table-layout: fixed; }
    table.enterprise-table thead th { text-align: left; padding: 12px 16px; border-bottom: 2px solid #e2e8f0; font-size: 11px; font-weight: 700; color: #64748b; text-transform: uppercase; tracking-wider; whitespace-nowrap; }
    table.enterprise-table tbody tr { transition: background-color 0.15s; }
    table.enterprise-table tbody tr:hover { background-color: #f8fafc; }
    html.dark table.enterprise-table tbody tr:hover { background-color: #1e293b; }
    table.enterprise-table tbody td { padding: 12px 16px; border-bottom: 1px solid #e2e8f0; font-size: 12px; color: #334155; vertical-align: middle; overflow: hidden; text-overflow: ellipsis; whitespace-nowrap; }
    html.dark table.enterprise-table tbody td { border-bottom-color: #1e293b; color: #cbd5e1; }
    table.enterprise-table tbody tr:last-child td { border-bottom: none; }
    table.enterprise-table tbody tr.expired-row td { color: #94a3b8; } 
  
    /* Tooltip styles */
    [data-tooltip] { position: relative; cursor: pointer; }
    [data-tooltip]::after { content: attr(data-tooltip); position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%) translateY(-5px); background-color: #1e293b; color: white; font-size: 9px; padding: 4px 8px; border-radius: 6px; whitespace-nowrap; opacity: 0; transition: opacity 0.2s, transform 0.2s; pointer-events: none; z-index: 100; font-weight: 500; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    [data-tooltip]:hover::after { opacity: 1; transform: translateX(-50%) translateY(-2px); }
  </style>
</head>
<body class="text-slate-800 dark:text-slate-100 transition-colors duration-300">

  <div id="loginScreen" class="absolute inset-0 bg-slate-50 dark:bg-slate-900 z-50 flex items-center justify-center px-4 transition-all duration-500 h-screen w-screen overflow-hidden">
    <div class="bg-white dark:bg-slate-800 p-6 md:p-8 rounded-3xl shadow-xl w-full max-w-sm border border-slate-100 dark:border-slate-700 text-center">
      <div class="w-14 h-14 md:w-16 md:h-16 rounded-2xl bg-blue-600 flex items-center justify-center text-white mx-auto mb-4 flex-shrink-0">
        <i class="fas fa-wallet text-2xl md:text-3xl"></i>
      </div>
      <h2 class="text-xl md:text-2xl font-extrabold text-slate-800 dark:text-white mb-1.5 tracking-tight">FinanSmart JagoNgulik</h2>
      <p class="text-xs md:text-sm text-slate-500 dark:text-slate-400 mb-6 font-medium">Pencatatan Keuangan Personal Cerdas AI</p>
      
      <form onsubmit="prosesLogin(event)">
        <div class="mb-3.5 text-left">
          <label class="block text-[11px] md:text-xs font-bold text-slate-600 dark:text-slate-400 mb-1">Username</label>
          <input type="text" id="loginUser" required class="w-full px-3 py-2.5 md:px-4 md:py-3 bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-xs md:text-sm dark:text-white font-medium transition">
        </div>
        <div class="mb-4 text-left">
          <label class="block text-[11px] md:text-xs font-bold text-slate-600 dark:text-slate-400 mb-1">Password</label>
          <input type="password" id="loginPass" required class="w-full px-3 py-2.5 md:px-4 md:py-3 bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-xs md:text-sm dark:text-white font-medium transition">
        </div>
        
        <div class="mb-5 flex items-center">
          <label class="flex items-center cursor-pointer group">
            <input type="checkbox" id="rememberMe" class="w-4 h-4 text-blue-600 bg-slate-100 border-slate-300 rounded focus:ring-blue-500 transition-colors cursor-pointer">
            <span class="ml-2 text-[11px] md:text-xs font-medium text-slate-600 dark:text-slate-400 group-hover:text-blue-600 transition-colors">Ingat Saya</span>
          </label>
        </div>

        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition shadow text-xs md:text-sm">
          Masuk ke Aplikasi
        </button>
      </form>
    </div>
  </div>

  <div id="adminContainer" class="absolute inset-0 w-full h-full bg-slate-50 dark:bg-slate-900 hidden opacity-0 transition-opacity duration-500 flex flex-col md:flex-row md:items-center md:justify-center md:p-4 overflow-hidden h-screen w-screen">
    <div class="w-full h-full max-w-md md:max-w-5xl bg-white dark:bg-slate-800 md:rounded-3xl shadow-none md:shadow-2xl flex flex-col md:flex-row md:h-[90vh] md:max-h-[850px] border-0 md:border border-slate-100 dark:border-slate-700 transition-colors duration-300 relative overflow-hidden">
      
      <div class="hidden md:flex flex-col w-60 bg-white dark:bg-slate-900 border-r border-slate-100 dark:border-slate-800 p-6 justify-between flex-shrink-0 transition-colors duration-300 z-10 overflow-hidden h-full">
        <div class="flex-shrink-0">
          <div class="flex items-center mb-10 mt-2 px-2">
            <div class="w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center text-white mr-3 shadow-lg shadow-indigo-500/30 flex-shrink-0">
              <i class="fas fa-user-shield"></i>
            </div>
            <h1 class="text-base md:text-lg font-extrabold text-slate-900 dark:text-white tracking-tight truncate flex-1">Admin JagoNgulik</h1>
          </div>
          <div class="space-y-1">
            <button onclick="switchAdminTab('adminDashboard')" class="nav-admin-btn nav-adminDashboard desktop-admin-btn w-full flex items-center px-4 py-3 rounded-xl text-xs md:text-sm font-bold text-indigo-700 dark:text-indigo-400 bg-indigo-50 dark:bg-indigo-900/30 transition-all">
              <i class="fas fa-chart-bar w-6 text-center mr-2 text-base md:text-lg flex-shrink-0"></i> Ringkasan
            </button>
            <button onclick="switchAdminTab('adminUser')" class="nav-admin-btn nav-adminUser desktop-admin-btn w-full flex items-center px-4 py-3 rounded-xl text-xs md:text-sm font-bold text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800/50 transition-all">
              <i class="fas fa-users w-6 text-center mr-2 text-base md:text-lg flex-shrink-0"></i> Users
            </button>
            <button onclick="switchAdminTab('adminSistem')" class="nav-admin-btn nav-adminSistem desktop-admin-btn w-full flex items-center px-4 py-3 rounded-xl text-xs md:text-sm font-bold text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800/50 transition-all">
              <i class="fas fa-cog w-6 text-center mr-2 text-base md:text-lg flex-shrink-0"></i> Pengaturan
            </button>
          </div>
        </div>
        
        <div class="pt-6 border-t border-slate-100 dark:border-slate-800 space-y-3 flex-shrink-0">
          <button onclick="toggleDarkMode()" class="w-full flex items-center justify-center px-4 py-2.5 rounded-xl text-xs font-bold text-slate-600 dark:text-slate-300 bg-slate-100/70 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 transition-all">
            <i class="fas fa-moon mr-2 text-sm"></i> Mode Gelap
          </button>
          <button onclick="prosesLogout()" class="w-full flex items-center justify-center px-4 py-2.5 rounded-xl text-xs font-bold text-rose-600 dark:text-rose-400 bg-rose-50 dark:bg-rose-950 hover:bg-rose-100 dark:hover:bg-rose-900 transition-all">
            <i class="fas fa-sign-out-alt mr-2 text-sm"></i> Keluar
          </button>
        </div>
      </div>

      <div class="flex-1 flex flex-col h-full relative overflow-hidden w-full max-w-full">
        <div class="flex-1 overflow-y-auto hide-scroll bg-slate-50/50 dark:bg-slate-800/30 transition-colors duration-300 w-full overflow-x-hidden px-4 md:px-10 pt-6 md:pt-10 pb-28 md:pb-10 h-full">
          
          <div id="adminDashboardSection" class="admin-tab-content block animate-fade-in w-full max-w-3xl mx-auto h-full overflow-y-auto hide-scroll">
            <div class="mb-6 pb-4 w-full flex justify-between items-center border-b border-slate-100 dark:border-slate-800 flex-shrink-0">
              <div>
